<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17242E">
<title>Groundwork — Estate & FM Study</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root{
  --ink:#17242E; --paper:#F2F4F5; --sheet:#FFFFFF; --rule:#D4DADD;
  --muted:#5B6770; --accent:#1F6FB2;
  --z-orient:#5B6770; --z-plan:#1F6FB2; --z-fm:#0E8A7B; --z-proc:#8A5A2B;
  --z-smart:#6B5CA5; --z-green:#4C8C3B; --z-cap:#B08A2E;
  --ok:#2E7D46; --warn:#B0452E;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--paper); color:var(--ink);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  font-size:16px; line-height:1.5;
  display:flex; flex-direction:column; overscroll-behavior:none;
}
button{font-family:inherit;}
a{color:var(--accent);}
.screen{display:none; flex-direction:column; flex:1; min-height:0;}
.screen.active{display:flex;}

header{
  flex-shrink:0; background:var(--ink); color:#F2F4F5;
  padding:calc(env(safe-area-inset-top, 0px) + 12px) 16px 10px 16px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  border-bottom:3px solid var(--accent);
}
header .brand{font-weight:800; letter-spacing:.14em; font-size:15px; text-transform:uppercase;}
header .sheetlabel{font-size:11px; letter-spacing:.12em; color:#9FB1BC; text-transform:uppercase; white-space:nowrap;}
header .backbtn{
  background:none; border:1px solid #3C4E5B; color:#F2F4F5; border-radius:6px;
  padding:4px 10px; font-size:13px; margin-right:8px; flex-shrink:0;
}
header .hleft{display:flex; align-items:center; min-width:0;}
header .htitle{font-weight:700; font-size:14px; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

.scroll-area{flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px; padding-bottom:28px;}

.legend{display:flex; gap:3px; margin:4px 0 6px 0;}
.legend .seg{flex:1; height:14px; border-radius:2px; border:1.5px solid var(--seg-c); background:transparent;}
.legend .seg.done{background:var(--seg-c);}
.progress-caption{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:14px;}
.fumblecard{
  background:#FBEFE9; border:1px solid #E4C2B2; border-left:5px solid var(--warn);
  border-radius:8px; padding:12px 14px; margin-bottom:14px;
}
.fumblecard .t{font-weight:700; font-size:14px;}
.fumblecard .d{font-size:13px; color:var(--muted); margin:2px 0 8px 0;}
.btn{display:inline-block; border:none; border-radius:8px; padding:10px 16px; font-size:14px; font-weight:700; cursor:pointer;}
.btn-ink{background:var(--ink); color:#fff;}
.btn-ghost{background:transparent; border:1.5px solid var(--ink); color:var(--ink);}
.btn-warn{background:var(--warn); color:#fff;}
.btn-ok{background:var(--ok); color:#fff;}
.btn:active{transform:translateY(1px);}

.sessionrow{
  display:flex; background:var(--sheet); border:1px solid var(--rule); border-radius:8px;
  margin-bottom:10px; overflow:hidden; width:100%; text-align:left; padding:0; cursor:pointer;
}
.sessionrow .zbar{width:7px; flex-shrink:0; background:var(--zc);}
.sessionrow .body{padding:10px 12px; flex:1; min-width:0;}
.sessionrow .eyebrow{font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--zc); font-weight:800;}
.sessionrow .t{font-weight:700; font-size:15px; line-height:1.3; margin:2px 0;}
.sessionrow .meta{font-size:12px; color:var(--muted);}
.sessionrow .status{align-self:center; padding:0 12px; font-size:18px; color:var(--rule); flex-shrink:0;}
.sessionrow .status.done{color:var(--ok);}

.tabs{display:flex; gap:6px; padding:12px 16px 0 16px; flex-shrink:0; background:var(--paper);}
.tabs button{
  flex:1; border:1.5px solid var(--rule); background:var(--sheet); border-radius:8px 8px 0 0;
  padding:8px 4px; font-size:13px; font-weight:700; color:var(--muted); border-bottom:none;
}
.tabs button.active{color:var(--ink); border-color:var(--zc); border-bottom:3px solid var(--zc);}
.whybox{background:var(--sheet); border:1px solid var(--rule); border-left:5px solid var(--zc);
  border-radius:8px; padding:12px 14px; margin-bottom:14px; font-size:14px;}
.whybox .lbl{font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--zc); font-weight:800; margin-bottom:4px;}
.item{
  background:var(--sheet); border:1px solid var(--rule); border-radius:8px;
  padding:10px 12px; margin-bottom:9px; display:flex; gap:10px; align-items:flex-start;
}
.item .box{
  width:22px; height:22px; border:2px solid var(--rule); border-radius:5px; flex-shrink:0;
  margin-top:2px; display:flex; align-items:center; justify-content:center;
  font-size:14px; color:#fff; background:transparent; cursor:pointer; padding:0;
}
.item.checked .box{background:var(--zc); border-color:var(--zc);}
.item .txt{flex:1; min-width:0;}
.item .t{font-weight:700; font-size:14px; line-height:1.35;}
.item.checked .t{color:var(--muted);}
.item .d{font-size:13.5px; color:#3A4A55; margin-top:3px;}
.item .d a{word-break:break-word;}
.sectionlbl{font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); font-weight:800; margin:16px 0 8px 0;}
.verify{
  background:#FFF8E6; border:1px solid #E8D9A8; border-left:5px solid #B08A2E;
  border-radius:8px; padding:10px 12px; margin-bottom:12px; font-size:13.5px;
}
.verify .lbl{font-size:10px; letter-spacing:.16em; text-transform:uppercase; font-weight:800; color:#8A6A16; margin-bottom:3px;}

/* resource card internals */
.badge{
  display:inline-block; font-size:10px; letter-spacing:.1em; text-transform:uppercase;
  font-weight:800; padding:2px 7px; border-radius:4px; margin-bottom:5px;
}
.badge.pub{background:#E3EEF7; color:#1A5786;}
.badge.int{background:#F0EAF7; color:#57478C;}
.badge.field{background:#E6F1E6; color:#2E6B33;}
.rmeta{font-size:12px; color:var(--muted); margin-top:5px;}
.rblock{margin-top:7px; font-size:13.5px;}
.rblock .k{font-size:10px; letter-spacing:.13em; text-transform:uppercase; font-weight:800; color:var(--muted); display:block;}
.rblock ul{margin:3px 0 0 0; padding-left:18px;}
.rblock li{margin-bottom:2px;}
.rafter{margin-top:8px; padding-top:7px; border-top:1px dashed var(--rule); font-size:13px; font-style:italic; color:#3A4A55;}
.rprime{margin-top:7px; font-size:13.5px; font-style:italic; background:#F4F6F7; border-radius:6px; padding:7px 9px; color:#3A4A55;}
.rprime .k{font-style:normal;}
.routput{margin-top:8px; font-size:13.5px; font-weight:700; border-top:1px dashed var(--rule); padding-top:7px;}
.rblock .k, .rprime .k, .routput .k{font-size:10px; letter-spacing:.13em; text-transform:uppercase; font-weight:800; color:var(--muted); display:block; margin-bottom:1px;}
.objlist{margin:2px 0 0 0; padding-left:18px;}
.objlist li{margin-bottom:3px;}

.footerbar{
  flex-shrink:0; background:var(--sheet); border-top:1px solid var(--rule);
  padding:10px 16px calc(env(safe-area-inset-bottom, 0px) + 10px) 16px;
  display:flex; gap:10px;
}
.footerbar .btn{flex:1; text-align:center;}

.timerbox{
  background:var(--ink); color:#F2F4F5; border-radius:10px; padding:14px;
  display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;
}
.timerbox .time{font-size:34px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:.04em;}
.timerbox .lbl{font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:#9FB1BC;}
.timerbox.zero .time{color:#F0B429;}
.timerbox .tbtns{display:flex; gap:8px;}
.timerbox .tbtns button{
  background:transparent; border:1.5px solid #3C4E5B; color:#F2F4F5;
  border-radius:8px; padding:8px 14px; font-size:13px; font-weight:700;
}
.cardcount{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:8px;}
.flashcard{
  background:var(--sheet); border:1px solid var(--rule); border-top:5px solid var(--zc);
  border-radius:10px; padding:18px 16px; min-height:150px;
}
.flashcard .q{font-weight:700; font-size:16px; line-height:1.45;}
.flashcard .a{margin-top:14px; padding-top:12px; border-top:1px dashed var(--rule); font-size:14.5px; color:#2C3E4A;}
.flashrow{display:flex; gap:10px; margin-top:14px;}
.flashrow .btn{flex:1;}
.reviewdone{background:var(--sheet); border:1px solid var(--rule); border-radius:10px; padding:18px 16px; text-align:center;}
.reviewdone .big{font-size:34px; font-weight:800;}
.reviewdone .sub{color:var(--muted); font-size:14px; margin-bottom:12px;}

@media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }
button:focus-visible, a:focus-visible{outline:3px solid var(--accent); outline-offset:2px;}
</style>
</head>
<body>

<div class="screen active" id="screen-home">
  <header>
    <span class="brand">Groundwork</span>
    <span class="sheetlabel">Estate · FMM · Infrastructure</span>
  </header>
  <div class="scroll-area" id="home-scroll"></div>
</div>

<div class="screen" id="screen-session">
  <header>
    <span class="hleft">
      <button class="backbtn" onclick="goHome()">&#8592;</button>
      <span class="htitle" id="sess-title"></span>
    </span>
    <span class="sheetlabel" id="sess-sheet"></span>
  </header>
  <div class="tabs" id="sess-tabs">
    <button id="tab-learn" onclick="setTab('learn')">Learn</button>
    <button id="tab-res" onclick="setTab('res')">Resources</button>
    <button id="tab-review" onclick="setTab('review')">Review</button>
  </div>
  <div class="scroll-area" id="sess-scroll"></div>
  <div class="footerbar">
    <button class="btn btn-ghost" id="btn-done" onclick="toggleDone()"></button>
  </div>
</div>

<script>
// M3: register the service worker first, before anything else can throw.
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

// M6: Singapore-safe local date string.
function localDateStr(d = new Date()) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function today(){ return localDateStr(new Date()); }

const TRACKS = {
  orient:{c:"var(--z-orient)", name:"Orientation"},
  plan:{c:"var(--z-plan)", name:"Land & Projects"},
  fm:{c:"var(--z-fm)", name:"FMM & the IBC"},
  proc:{c:"var(--z-proc)", name:"Procurement"},
  smart:{c:"var(--z-smart)", name:"Smart FM"},
  green:{c:"var(--z-green)", name:"Green & Safety"},
  cap:{c:"var(--z-cap)", name:"Capstone"}
};

const SESSIONS = [

/* ---------------- 1 ---------------- */
{ id:"s1", num:1, track:"orient", title:"Government as Owner, Occupier & Client",
  why:"Most confusion in this job comes from three overlapping roles the agency plays at once \u2014 it owns (or holds) the premises, it occupies them, and it is the client buying services to run them. Get that separation clear and every later session hangs off it. This whole plan is pitched at civil service level: how a department gets, funds, builds and runs its own facilities, not how the property market works.",
  concepts:[
    {t:"The public-sector lifecycle chain", d:"Plan (land use, campus master plan) \u2192 fund (development budget, capex approval) \u2192 build (consultants, main contractor, TOP/CSC) \u2192 occupy \u2192 maintain and operate (FMM + the IBC) \u2192 renew, retrofit or hand back. Every topic in these 10 sessions sits somewhere on this chain. Memorise it \u2014 it is your recall anchor."},
    {t:"Who does what around you", d:"URA plans land use and issues planning permission. SLA administers state land and state properties, and is how agencies hold their premises. BCA regulates buildings and sets FM standards. MOF sets procurement policy, executed through GeBIZ. MSE drives GreenGov.SG across the public sector. Your ministry HQ controls budget and policy. Your own FMM function is the client-side operator of the estate."},
    {t:"Asset vs property vs facilities management \u2014 government version", d:"In the private sector these split by money: asset = portfolio value, property = rent and leases, FM = operations. In government there is usually no rent and no capital gain, so the value test changes: does the estate keep the mission running, stay safe and compliant, and do it at a defensible cost per square metre? Asset thinking becomes long-term capital planning; property thinking becomes space allocation and tenure; FM stays FM."},
    {t:"Client-side vs delivery-side \u2014 where FMM sits", d:"FMM is the client-side function: it specifies what standard the estate must be kept to, buys the service, and holds the contractor to it. The IBC is the delivery side: it supplies the labour, plant maintenance and services. You can outsource delivery. You cannot outsource accountability \u2014 statutory duties, budget responsibility and the consequences of failure stay with the agency. This distinction is the spine of Sessions 5 and 6."},
    {t:"What is different about a Home Team / security estate", d:"Compared with an ordinary office building, a training and operational campus adds: security clearance and escorting for contractor staff, restricted areas and work-permit controls, operational continuity requirements (training and operations cannot simply stop for maintenance), specialised training facilities with unusual wear and safety profiles, and heavier training-safety governance. Every FM concept in this plan still applies \u2014 it just applies under tighter constraints."}
  ],
  objectives:["Draw the public-sector estate lifecycle and place URA, SLA, BCA, MOF and MSE on it, unaided, in under 5 minutes", "Explain where FMM's accountability ends and the IBC's delivery role begins, with one concrete example from your campus", "Name your agency's approval route for a repair, a retrofit and a new building without checking"],
  transfer:"In one work conversation this week, deliberately frame an FMM issue using the client-side vs delivery-side distinction \u2014 and notice whether it changes how the discussion goes.",
  resources:[{"badge": "pub", "t": "BCA \u2014 Facilities Management section of the corporate website", "where": "bca.gov.sg \u2192 navigate to the Facilities Management landing page (under Buildings / Industry Info). All FM guides, Smart FM and outcome-based contracting pages link from there. Everything is free and public.", "url": "https://www.bca.gov.sg", "time": "25 min", "prime": "Before opening: list what you think a building regulator would do about FM beyond writing rules. Then count how many you predicted.", "task": ["Skim the FM landing page and every sub-page title", "Note each distinct role BCA plays \u2014 regulator, standards-setter, industry developer, funder", "Copy the titles and links of the guides you will need later (output-based FM, Smart FM, DfM) into your notes"], "output": "A 5-line note: BCA's FM roles, plus your Sessions 5 and 8 reading list with working links.", "check": ["You can name at least three distinct BCA roles in FM", "Your reading list links actually open"]}, {"badge": "pub", "t": "SLA \u2014 state land and state property pages", "where": "sla.gov.sg \u2192 Land / State Property sections. Skip the rental listings; you want how state land and property are administered and allocated to agencies.", "url": "https://www.sla.gov.sg", "time": "20 min", "prime": "Recall how your campus land is described internally \u2014 'our land'? 'allocated'? You are about to find out which is technically right.", "task": ["Read the state land and state property pages", "Write, in your own words, the difference between owning, holding and being allocated land", "Note which SLA process applies if your agency needed adjacent land"], "output": "A 3-sentence explanation of how an agency actually holds its premises.", "check": ["Your explanation avoids the word 'own' or qualifies it correctly", "You know which body to approach for more land"]}, {"badge": "pub", "t": "MOF \u2014 Government Procurement policy framework", "where": "mof.gov.sg \u2192 Policies \u2192 Government Procurement \u2192 overview page plus the 'Procurement processes' sub-page. The public face of the rules; the operational detail is in the Instruction Manuals on your intranet.", "url": "https://www.mof.gov.sg/policies/government-procurement/", "time": "25 min", "prime": "From your GeBIZ scraping you know tenders from the vendor's side. Now read the rules that produced them \u2014 from the buyer's chair.", "task": ["Read the overview and processes pages", "Write the three principles, with one sentence each on how they constrain an FM manager", "Note the sourcing methods and the indicative value bands"], "output": "A one-paragraph answer to: 'Why can't we just keep the contractor we like?'", "check": ["Your paragraph cites at least two of the three principles", "You flagged the thresholds as needing internal verification"]}, {"badge": "int", "t": "Your agency's estate governance documents \u2014 internal", "where": "Intranet or your reporting officer. Ask for: the org chart covering FMM and any works/projects unit, the delegation of financial authority table, and the terms of reference of committees handling building matters.", "time": "20 min", "prime": "Predict before asking: who do you THINK signs off a $50k repair? Write it down \u2014 being wrong here is the useful data.", "task": ["Obtain the org chart, financial delegation table and committee ToRs", "Trace three hypothetical approvals end to end: a $50k repair, a $500k retrofit, a new block", "Compare against your prediction and note every surprise"], "output": "A one-page approval map with the three traced examples on it.", "check": ["Each trace names the officer or committee at every step", "You can state the dollar breakpoints from memory"]}, {"badge": "field", "t": "Field task \u2014 draw the one-page map", "where": "Paper or tablet, one A4 page.", "time": "20 min", "prime": "This diagram is the anchor for all ten sheets \u2014 everything you learn from here gets a location on it.", "task": ["Draw the lifecycle chain across the page", "Place the five external agencies where they bite", "Add your internal players beneath, with the IBC hanging off FMM", "Photograph it \u2014 you will redraw it from memory at Sheets 4, 7 and 10"], "output": "The A4 map, photographed and saved where you can find it.", "check": ["A colleague could follow it without you explaining", "Every box is something you verified today, not a guess"]}],
  review:[
    {q:"Recite the public-sector lifecycle chain, end to end.", a:"Plan \u2192 fund \u2192 build \u2192 occupy \u2192 maintain and operate \u2192 renew, retrofit or hand back."},
    {q:"An agency plays three roles at once with its premises. Name them.", a:"Owner/holder of the premises, occupier of them, and client buying the services that keep them running."},
    {q:"What can be outsourced to the IBC and what cannot?", a:"Delivery can be outsourced \u2014 labour, maintenance, services. Accountability cannot: statutory duties, budget responsibility and the consequences of failure stay with the agency."},
    {q:"In government, what replaces rent and capital gain as the measure of estate value?", a:"Mission continuity, safety and compliance, delivered at a defensible cost per square metre."},
    {q:"Match each to its role: URA, SLA, BCA, MOF, MSE.", a:"URA \u2014 land use planning and planning permission. SLA \u2014 state land and state property administration. BCA \u2014 building regulation and FM standards. MOF \u2014 procurement policy. MSE \u2014 GreenGov.SG sustainability targets across the public sector."},
    {q:"Name four things that make a Home Team training campus harder to maintain than an office block.", a:"Security clearance and escorting of contractor staff; restricted areas and permit controls; operational continuity (training and ops cannot pause for maintenance); specialised training facilities with unusual wear and safety profiles."}
  ]},

/* ---------------- 2 ---------------- */
{ id:"s2", num:2, track:"plan", title:"Land, Planning & the Campus",
  why:"Infrastructure planning starts with what you are legally allowed to build, where, and how much of it. Two attributes \u2014 zoning and plot ratio \u2014 carry most of that. Then comes the agency-specific layer: how a government campus is allocated land, and how you plan its use over 10 to 20 years.",
  concepts:[
    {t:"The planning hierarchy", d:"Long-Term Plan (about 50 years, non-statutory, sets the broad direction) \u2192 Master Plan (statutory, 10\u201315 year horizon, revised roughly every 5 years; Master Plan 2025 was gazetted 1 December 2025) \u2192 detailed control plans and guidelines. Gazetting is what makes the Master Plan the binding land use plan under the Planning Act."},
    {t:"Zoning and Gross Plot Ratio", d:"Every plot carries a land use zone (what may be built) and a Gross Plot Ratio (how intensely). GPR \u00d7 site area = maximum gross floor area. Building height controls are a separate limit \u2014 a development must satisfy both, and whichever binds first is your real ceiling. Government campuses commonly sit in zones such as Civic & Community Institution, Educational Institution, or Special Use; check yours rather than assuming."},
    {t:"How an agency holds its land", d:"Agencies typically occupy state land allocated for their use rather than owning it commercially. That shapes what you can do: alterations, additions, subletting space to another agency or a canteen operator, and giving land back all run through defined processes rather than a landlord\u2013tenant negotiation. The exact route is agency-specific \u2014 confirm yours internally."},
    {t:"Development control still applies", d:"Building on a government site is not exempt from the system: planning permission from URA and building plan approval and inspection under BCA still apply, alongside SCDF fire safety approval and PUB, NEA and other clearances. Security-sensitive sites have special handling for how plans are treated \u2014 verify the actual arrangement for your campus internally rather than assuming either exemption or full disclosure."},
    {t:"Campus master planning", d:"The agency-level version of master planning: what the campus must accommodate in 10\u201320 years, space norms per function, phasing of new blocks, decanting (where do occupants go while a block is rebuilt), safeguarding land for future needs, and the utilities and road capacity that constrain all of it. This is the true meeting point of \u2018infrastructure planning\u2019 and \u2018estate management\u2019 in your role."}
  ],
  objectives:["Look up any Singapore site on URA SPACE and correctly read its zone, GPR and height control", "State your campus's zone and plot ratio from memory and estimate its remaining development headroom", "Explain in two sentences what gazetting the Master Plan changes legally"],
  transfer:"Next time a colleague mentions any development ('they're building X at Y'), look it up on URA SPACE on the spot and read out the parameters.",
  resources:[{"badge": "pub", "t": "URA SPACE \u2014 look up your own campus", "where": "ura.gov.sg \u2192 Maps (URA SPACE). Search the address, click the parcel; the panel shows zone, GPR and controls.", "url": "https://www.ura.gov.sg/maps/", "time": "30 min \u2014 the highest-value half hour in this session", "prime": "Predict your campus zone and GPR before you look. Most people are wrong about their own site \u2014 test yourself.", "task": ["Look up your campus; record zone, GPR, height control", "Repeat for four contrasting sites: a residential estate, a business park, a reserve site, another government facility", "Compute rough maximum GFA for your campus (GPR \u00d7 site area) and compare it against what is actually built"], "output": "A 5-row table: site, zone, GPR, height, one observation each \u2014 plus your headroom estimate.", "check": ["You can explain why the government facility's zone reads differently from the mall's", "Your headroom estimate contains actual numbers"]}, {"badge": "pub", "t": "URA \u2014 Master Plan portal and MP2025 material", "where": "ura.gov.sg \u2192 Land & Planning \u2192 Master Plan. Read the explainer, then the MP2025 announcement material linked from it. Skip individual planning-area write-ups unless yours is covered.", "url": "https://www.ura.gov.sg/land-planning/master-plan/", "time": "30 min", "prime": "Before reading, write one sentence on what you think 'gazetted' changes. You will correct it in twenty minutes.", "task": ["Read the Master Plan explainer and MP2025 announcement", "Correct or confirm your 'gazetted' sentence", "Note how amendments work between the five-year revisions", "List MP2025's broad thrusts and mark any touching your campus's planning area"], "output": "A corrected two-sentence definition of gazetting plus the thrust list.", "check": ["Your definition distinguishes statutory from advisory plans", "You know whether your planning area changed under MP2025"]}, {"badge": "pub", "t": "CLC \u2014 Urban Systems Studies: 'Land Framework of Singapore'", "where": "clc.gov.sg \u2192 Publications \u2192 Urban Systems Studies \u2192 free PDF download. About 100 pages; skim the history, slow-read the mechanics.", "url": "https://www.clc.gov.sg", "time": "45 min targeted read", "prime": "Bring your BPR lens: land assembly is a process. As you read, keep asking what the process owner controls at each step.", "task": ["Sketch the flow as you read: acquisition \u2192 state land \u2192 planning \u2192 allocation or sale \u2192 development", "Mark where SLA acts and where URA acts on your sketch", "Note two mechanisms that make 30-year infrastructure planning possible here and rare elsewhere"], "output": "A half-page flow sketch with the two mechanisms annotated.", "check": ["Your sketch shows both agencies in the right places", "You can defend each mechanism to a sceptic in one minute"]}, {"badge": "int", "t": "Your campus master plan and land documents \u2014 internal", "where": "FMM, the works/projects unit, or corporate services. Ask for: the campus master plan or development plan, the site plan with boundaries, and tenure documentation.", "time": "30 min", "prime": "Before asking, write down what you believe the next two campus developments are \u2014 test institutional rumour against paper.", "task": ["Mark on the plan: safeguarded areas, end-of-life blocks, constraints (setbacks, services corridors, drainage reserve)", "Compare the documents against your prediction", "Note anything the paper shows that nobody talks about"], "output": "An annotated site plan, or notes keyed to it.", "check": ["You can name the next two physical changes with rough dates", "You know at least one constraint that is invisible on the ground"]}, {"badge": "field", "t": "Field task \u2014 walk the boundary", "where": "Your own campus, site plan in hand.", "time": "20 min", "prime": "You have now seen the site three ways on paper \u2014 go verify it with your feet.", "task": ["Walk the boundary against the plan", "Mark where reality surprises you: fence lines, encroachments, unused corners", "Note what sits immediately outside and whether MP2025 changes it"], "output": "The marked-up plan plus three photos of anything that did not match paper.", "check": ["At least one surprise recorded \u2014 if zero, you walked too fast"]}],
  review:[
    {q:"State the planning hierarchy and which layer is statutory.", a:"Long-Term Plan (~50 yr, non-statutory) \u2192 Master Plan (statutory, 10\u201315 yr, revised ~5-yearly; MP2025 gazetted 1 Dec 2025) \u2192 detailed control plans and guidelines."},
    {q:"What does GPR determine, and what separate control can override it?", a:"GPR \u00d7 site area = maximum gross floor area. Building height controls are a separate limit; whichever binds first is the real ceiling."},
    {q:"How does a government agency typically hold its campus land?", a:"As state land allocated for its use, rather than commercial ownership \u2014 so alterations, sub-allocation and hand-back run through defined processes, not landlord\u2013tenant negotiation."},
    {q:"Does building on a government site bypass URA and BCA?", a:"No. Planning permission, building plan approval, SCDF fire safety and other clearances still apply; security-sensitive sites have special handling of how plans are treated, which must be confirmed internally."},
    {q:"Name five things a campus master plan must resolve.", a:"Future space needs, space norms per function, phasing of works, decanting during construction, and land safeguarded for future use \u2014 all within utilities and road capacity constraints."}
  ]},

{ id:"s3", num:3, track:"plan", title:"From Need to Building: Capital Projects",
  why:"Between a plan and an operating building sits a capital project: a different budget, a different approval route, a different cast of players. FMM inherits whatever that project hands over \u2014 which is why being in the room early is the highest-leverage thing an FM professional does.",
  concepts:[
    {t:"Development budget vs operating budget", d:"Two separate pots with separate rules. Development (capital) budget funds new build and major upgrading, approved on a project basis over multiple years. Operating budget funds running the estate year to year \u2014 the IBC contract, utilities, consumables, minor works. The classic trap: a capital decision that saves construction cost and quietly raises the operating bill for the next 30 years. Confirm your own agency's split, thresholds and approval route internally."},
    {t:"The project cast", d:"The agency is the client and project owner. Consultants are appointed \u2014 architect, quantity surveyor, civil and structural engineer, M&E engineer, sometimes a project manager. A main contractor builds, with subcontractors under it. Your role as client is defining requirements, approving decisions, and holding the programme and budget \u2014 not designing."},
    {t:"The delivery milestones", d:"Requirements and brief \u2192 design \u2192 planning and building approvals \u2192 tender \u2192 construction \u2192 TOP (Temporary Occupation Permit \u2014 permits occupation once key requirements are met) \u2192 CSC (Certificate of Statutory Completion \u2014 full statutory compliance) \u2192 DLP (Defects Liability Period, typically 12 months) \u2192 handover to FMM. Learn TOP vs CSC vs DLP cold; they come up constantly."},
    {t:"Why FMM must be in the room at design", d:"Roughly 80% of a building's lifetime operating cost is locked in at design. FMM's asks at design stage: maintainable access to plant and facades, standardised equipment to cut spares inventory, adequate plant room and store space, durable and cleanable finishes, and metering that lets you see where energy goes. Ask late and you pay for 30 years."},
    {t:"The handover package \u2014 the thing FMM actually inherits", d:"At handover you should receive: as-built drawings, O&M manuals, the asset register with equipment schedules, testing and commissioning records, warranties, spare parts and keys, and statutory certificates. A weak handover package cripples maintenance planning and makes any later Smart FM effort impossible \u2014 see Session 8. DLP is the window to catch defects; warranties on specific equipment may run longer than DLP and are tracked separately."}
  ],
  objectives:["Sequence the delivery milestones \u2014 brief, design, approvals, tender, construction, TOP, CSC, DLP, handover \u2014 unaided", "Present FMM's five design-stage asks for the next project, each justified in lifecycle-cost terms", "Audit a handover package against the six-item checklist and state exactly what is missing"],
  transfer:"Find one live or recent project at work and ask its owner one question this week: 'What will FMM inherit at handover, and who checked it?'",
  resources:[{"badge": "pub", "t": "BCA \u2014 TOP and CSC guidance", "where": "bca.gov.sg \u2192 search 'Temporary Occupation Permit', or via the building control section. Also read the Building Control framework page on the qualified person, accredited checker and site supervisor.", "url": "https://www.bca.gov.sg", "time": "25 min", "prime": "Write your current one-line understanding of TOP vs CSC. Most people conflate them \u2014 you will correct yours shortly.", "task": ["Read the TOP/CSC guidance and the roles pages", "Correct your one-liner", "Build a three-row table: QP, accredited checker, site supervisor \u2014 and what each certifies"], "output": "A corrected TOP-vs-CSC explanation plus the three-role table.", "check": ["You can say what legally becomes possible at TOP that was not before", "Each role in your table has a distinct certifying function"]}, {"badge": "pub", "t": "BCA \u2014 Design for Maintainability guides", "where": "bca.gov.sg \u2192 search 'Design for Maintainability'. Versioned guides, some per building type; download the overview guide as PDF.", "url": "https://www.bca.gov.sg", "time": "40 min \u2014 skim technical detail, work the checklists", "prime": "Recall the worst maintenance-access problem you have seen or heard of on campus. Hold it in mind as your test case while reading.", "task": ["Extract the ten checklist items most relevant to your campus's building types", "Apply them retrospectively to your test case: which item, enforced at design, would have prevented it?", "Reword each item so it could sit in a tender specification"], "output": "Your top-10 DfM ask list, tender-ready, with your test case mapped to one item.", "check": ["Each item is specific enough to evaluate a design against", "Your test case genuinely maps \u2014 if not, your list is missing a category"]}, {"badge": "int", "t": "Your newest building's handover package \u2014 internal", "where": "FMM records: the handover documentation of the most recently completed building or major A&A. If nobody can produce it quickly, that is itself the finding.", "time": "30 min", "prime": "Hypothesis before evidence: rate your agency's handover documentation 1\u20135. Now go find out.", "task": ["Audit against the six items: as-builts, O&M manuals, asset register, T&C records, warranties, spares and keys \u2014 plus statutory certificates", "Score each: present / partial / missing", "Note whether the asset register is usable data or a stack of PDFs"], "output": "A six-line audit scorecard with your original 1\u20135 guess written beside it.", "check": ["Every line is scored from evidence, not memory", "You know which equipment warranties are still live"]}, {"badge": "int", "t": "Your capital works approval route \u2014 internal", "where": "Finance or the works unit: current guidance on how a development project is proposed, costed, approved and funded, with thresholds.", "time": "25 min", "prime": "You mapped operating approvals in Sheet 1 \u2014 predict how the capital route differs before you ask.", "task": ["Map the route: business case \u2192 approvals \u2192 funding \u2192 delivery", "Mark where lifecycle cost formally enters the business case \u2014 or record its absence", "Estimate realistic elapsed time from proposal to start on site"], "output": "A capital-route map drawn beside your Sheet 1 operating map.", "check": ["Your elapsed-time estimate came from someone who has done it, not from the procedure document", "You can say whether lifecycle cost is formally weighed \u2014 yes, no, or only informally"]}, {"badge": "field", "t": "Field task \u2014 interview one project person", "where": "Twenty minutes with someone in the works/projects unit, or a colleague who saw a recent project through.", "time": "20 min", "prime": "Write your three questions before the conversation \u2014 the discipline of writing them is half the value.", "task": ["Ask: what did FMM wish it had asked for at design, and didn't?", "Ask: what went wrong at handover?", "Ask: what surfaced just after DLP closed?", "Capture the answers verbatim while fresh"], "output": "Three quoted lessons from someone who lived them.", "check": ["At least one answer contradicts what the official process says should happen \u2014 that contradiction is the gold"]}],
  review:[
    {q:"Development budget vs operating budget \u2014 what does each fund and what is the classic trap?", a:"Development funds new build and major upgrading on a project basis; operating funds year-to-year running (IBC contract, utilities, minor works). The trap: a capital saving that raises operating cost for decades."},
    {q:"TOP vs CSC vs DLP.", a:"TOP permits occupation once key requirements are met; CSC certifies full statutory completion; DLP (typically 12 months) is the period in which the contractor must rectify defects."},
    {q:"Why must FMM be involved at design stage?", a:"Around 80% of lifetime operating cost is locked in at design \u2014 access, standardisation, plant space, durable finishes and metering are all cheap to ask for then and very expensive to retrofit."},
    {q:"Name six items that must be in a proper handover package.", a:"As-built drawings, O&M manuals, asset register with equipment schedules, testing and commissioning records, warranties, spare parts and keys, plus statutory certificates."},
    {q:"Why is DLP not the same as warranty?", a:"DLP is the contractual period for the contractor to rectify defects generally; individual equipment warranties may run longer and are tracked separately."}
  ]},

{ id:"s4", num:4, track:"fm", title:"FMM I: Maintenance Strategy & Compliance",
  why:"Four maintenance strategies answer most maintenance questions, and the statutory regimes are non-negotiable. If you know only one thing from this plan operationally, make it the ability to say which strategy a given asset should be on and why \u2014 and to know what the law requires regardless.",
  concepts:[
    {t:"Hard FM vs soft FM", d:"Hard: the building's fabric and M&E \u2014 ACMV (air-conditioning and mechanical ventilation), lifts and escalators, fire protection systems, electrical, plumbing and sanitary, facade, generators, and specialised training installations. Soft: services to occupants \u2014 cleaning, security, landscaping, pest control, waste management, sometimes catering support. An integrated contract bundles both, which is exactly what makes it complex to specify."},
    {t:"The four maintenance strategies", d:"Corrective (run to failure \u2014 rational for cheap, non-critical, quickly replaced items). Preventive (time or usage based \u2014 the workhorse, and what most statutory regimes effectively mandate). Condition-based (act on inspection or sensor readings rather than the calendar). Predictive (analytics forecast the failure before symptoms appear). The skill is not knowing the four names; it is defending a choice per asset class on criticality, failure cost and consequence."},
    {t:"Statutory and mandatory maintenance", d:"Non-negotiable regardless of budget: lift and escalator maintenance and the associated permit/inspection regime; annual fire certificate and maintenance of fire protection systems under SCDF requirements; Periodic Facade Inspection \u2014 every 7 years for buildings over 13 m tall and over 20 years old; cooling tower cleaning and water quality controls; water tank cleaning; licensed electrical worker requirements for installations above defined capacity; lightning protection and other periodic testing. Confirm the full list applicable to your campus \u2014 specialised training facilities may carry additional regimes."},
    {t:"The compliance register", d:"The single most useful artefact FMM can own: every statutory obligation on the estate, with the asset, the frequency, the last done date, the next due date, the evidence document and the named responsible officer. If it does not exist, building it is a defensible first project. It is also what an auditor asks for first."},
    {t:"Criticality and the maintenance plan", d:"Rank assets by consequence of failure: what stops operations or training, what creates a safety or security breach, what merely inconveniences. Criticality drives strategy, spares holding, response time targets in the IBC contract, and redundancy decisions at design. This ranking is what turns a generic PPM schedule into a defensible one."}
  ],
  objectives:["Assign and defend a maintenance strategy for any asset class using criticality, failure cost and consequence", "State the statutory maintenance regimes applying to your campus, with their cycles, from memory", "Assess a compliance register \u2014 or its absence \u2014 against the six-field standard"],
  transfer:"Pick one asset this week and challenge its current strategy with FMM or the IBC. Either the strategy survives the challenge, or you have found an improvement \u2014 both outcomes are wins.",
  resources:[{"badge": "pub", "t": "BCA \u2014 Periodic Facade Inspection", "where": "bca.gov.sg \u2192 search 'Periodic Facade Inspection' \u2192 regime page plus the guide or handbook PDF.", "url": "https://www.bca.gov.sg", "time": "25 min", "prime": "List your campus buildings and guess which are PFI-captured (over 13 m, over 20 years). Then verify.", "task": ["Read the regime: capture thresholds, cycle, who may inspect, the owner's duties", "Confirm the capture list for your campus and last inspection dates", "Note what follows if a defect is found"], "output": "A capture table: building, height, age, PFI-captured yes/no, next due date.", "check": ["Every building has a yes/no with the reason", "You know what qualification the appointed inspector must hold"]}, {"badge": "pub", "t": "SCDF \u2014 Fire Certificate and fire safety maintenance", "where": "scdf.gov.sg \u2192 fire safety regulatory section \u2192 Fire Certificate pages, plus Fire Safety Manager requirements.", "url": "https://www.scdf.gov.sg", "time": "25 min", "prime": "Do you know your fire certificate renewal date? Write your guess \u2014 the gap between guess and fact is your finding.", "task": ["Establish which of your premises need Fire Certificates and Fire Safety Managers", "Record renewal dates and the named accountable officers", "Note what must be maintained and tested to keep the certificate"], "output": "A one-line-per-building FC/FSM status list with dates and names.", "check": ["No blanks in the accountable-officer column", "Your original guess is written next to the true renewal date"]}, {"badge": "pub", "t": "Atkin & Brooks, 'Total Facility Management' \u2014 maintenance chapters", "where": "NLB e-book: search the title in Libby/OverDrive or the NLB eResources portal with your library login. Any current FM textbook covering maintenance strategy substitutes fine \u2014 the framework is standard.", "time": "45 min \u2014 maintenance and service delivery chapters only", "prime": "You already run this logic in Lean terms: run-to-fail is accepted waste, preventive is standard work. Read for what the FM framing adds that Lean lacks.", "task": ["Read the formal strategy definitions and their decision criteria", "For five asset classes on your campus, write the strategy you would assign and a one-line defence", "Note how a maintenance backlog is defined and quantified as a liability"], "output": "Five asset-class strategy calls, each with its defence line.", "check": ["At least one of your calls differs from current practice \u2014 that one is worth investigating", "You can define 'backlog' in dollar terms, not vibes"]}, {"badge": "int", "t": "Your PPM schedule and compliance position \u2014 internal", "where": "FMM records or the IBC's monthly report: the planned preventive maintenance schedule and any statutory compliance tracker.", "time": "30 min", "prime": "Predict your PPM completion rate before asking. If the claimed figure is above 95%, your follow-up question is: evidenced how?", "task": ["Extract three numbers: PPM completion rate, reactive-to-planned ratio, count of overdue statutory items", "Test the tracker against the six-field standard: asset, frequency, last done, next due, evidence, named owner", "List every field the tracker is missing \u2014 or record that no consolidated register exists"], "output": "Three numbers plus a gap list against the six fields.", "check": ["All three numbers come from records, not recollection", "You can answer today, with evidence: is anything statutory overdue?"]}, {"badge": "field", "t": "Field task \u2014 rank your top 10 critical assets", "where": "One page, with an FMM colleague \u2014 not solo.", "time": "25 min", "prime": "Frame it as FMEA-lite. You have run this in process form for years; now run it on physical assets.", "task": ["List ten assets whose failure stops training or operations, or creates a safety or security exposure", "Record the current maintenance strategy for each", "Star every asset where strategy does not match criticality", "Agree one next action per starred asset"], "output": "A ranked top-10 with mismatch stars and next actions.", "check": ["The ranking was argued with a colleague, not asserted", "Every star has an owner and an action, not just a star"]}],
  review:[
    {q:"Name the four maintenance strategies with an asset each is right for.", a:"Corrective (light fittings, low-cost non-critical items); preventive (lifts, fire systems \u2014 also statutory); condition-based (facade, switchgear, via inspection or sensors); predictive (chillers, where analytics data exists)."},
    {q:"State the Periodic Facade Inspection rule.", a:"Every 7 years, for buildings over 13 m tall and more than 20 years old."},
    {q:"What is a compliance register and what must each line contain?", a:"The list of every statutory obligation on the estate, each with the asset, frequency, last done date, next due date, evidence document and named responsible officer."},
    {q:"What does criticality ranking actually drive?", a:"Maintenance strategy per asset, spares holding, response time targets written into the IBC contract, and redundancy decisions at design stage."},
    {q:"Hard FM vs soft FM \u2014 four examples each.", a:"Hard: ACMV, lifts, fire protection, electrical, facade, generators. Soft: cleaning, security, landscaping, pest control, waste."},
    {q:"What does a high ratio of reactive to planned work tell you?", a:"The maintenance regime is losing ground \u2014 preventive work is being displaced by failures, which usually means a growing backlog and rising cost."}
  ]},

{ id:"s5", num:5, track:"fm", title:"FMM II: The IBC Model \u2014 What You're Buying",
  why:"This is your stated knowledge gap, so it gets two full sessions. This one is about the contract as an object: what an integrated building contractor is engaged to do, how the scope is structured, and where the money and the arguments actually sit. Session 6 is about running the relationship.",
  verify:"Terminology and contract structure differ between agencies. Everything below is the standard integrated-FM pattern and will be broadly right \u2014 but your own IBC contract is the authoritative text. Read it alongside this session and correct anything that does not match.",
  concepts:[
    {t:"What \u2018integrated\u2019 means", d:"Instead of separate contracts for cleaning, ACMV servicing, lift maintenance, pest control, landscaping and so on, one contractor takes the whole bundle across the site for a fixed term. The agency buys a single point of accountability. The rationale: fewer interfaces, no finger-pointing between trades, less contract administration overhead, and one party who cannot claim a problem is somebody else's scope. The trade-off: greater dependency on one supplier and a harder re-tender."},
    {t:"Anatomy of the contract", d:"Learn to navigate these parts by name. Conditions of contract (the legal terms). Service specification or scope of works (what standard, what frequency, what is included). Schedule of rates (agreed prices for work ordered outside the base scope). Manpower schedule (if the contract specifies posted staff). Deliverables schedule (PPM programme, asset register, monthly reports, statutory submissions). KPI or performance schedule. Term and extension options. Exclusions. When something goes wrong, the answer is almost always in the scope or the exclusions."},
    {t:"The routine/additional split \u2014 the practical crux", d:"Base scope is covered by the contract sum: the contractor does it and you do not pay extra. Additional works are ordered separately and priced from the schedule of rates or by quotation. Almost every day-to-day dispute is really an argument about which side of that line a job falls on. Master this split for your own contract and you will be immediately more useful than someone who has only read FM theory."},
    {t:"Risk allocation \u2014 read this before you need it", d:"Who supplies consumables? Who carries spare parts, and up to what value? At what threshold does a replacement stop being maintenance and become a capital item? Who makes statutory submissions and holds the licences? Who is liable when a latent defect surfaces? What insurance does the contractor carry and for what limits? Who owns the maintenance data and the asset register? Each of these is a line in the contract, and each becomes a fight if unclear."},
    {t:"Manpower-based vs outcome-based specification", d:"Manpower/input specification says: post four technicians, sweep three times a day. Outcome specification says: keep the system available 99% of the time, keep the area to this cleanliness standard, verified by inspection. BCA is actively pushing outcome-based FM contracting. Outcome-based transfers optimisation to the contractor and stops you paying for attendance rather than results \u2014 but it only works if the standards are genuinely measurable and you have the capability to verify them. Many agency contracts are hybrids; identify which yours is."},
    {t:"Term, options and the re-tender clock", d:"FM term contracts commonly run two to three years with options to extend. The re-tender is a long project: scope review, market sounding, specification drafting, approvals, tender period, evaluation, award, mobilisation and handover between contractors. Start it far earlier than feels necessary \u2014 typically nine to twelve months before expiry \u2014 or you end up extending by default and losing your negotiating position."}
  ],
  objectives:["Navigate your IBC contract's parts by name and locate any provision in under two minutes", "Rule on routine-vs-additional for any given job, citing the scope or exclusions clause", "State the contract's expiry date, extension options and re-tender trigger point from memory"],
  transfer:"Sit in on, or review, one additional-works decision this week. Rule independently which side of the line it falls, then compare your call with the official one \u2014 a disagreement is a learning event either way.",
  resources:[{"badge": "int", "t": "Your own IBC contract \u2014 the primary text for this session", "where": "FMM's contract file or your procurement/contracts officer: the full contract with all schedules, variations and supplemental agreements.", "time": "60 min \u2014 the most valuable hour in this entire plan", "prime": "Before opening, write five questions you want the contract to answer \u2014 e.g. 'who pays when a chiller part fails in year 3?' Read to answer them, not to 'cover' the document.", "task": ["Read the scope of works, and the exclusions list twice", "Extract expiry date, options and notice periods onto the first page of your notes", "Trace the additional-works pricing route: schedule of rates, then quotation", "Hunt down your five answers; mark any question the contract fails to answer"], "output": "A one-page contract crib: key dates, the routine/additional rule, spares and consumables allocation, and the data-ownership clause or its absence.", "check": ["All five questions answered with clause references \u2014 or flagged as re-tender items", "You can state the expiry date without looking"]}, {"badge": "pub", "t": "BCA \u2014 Guide to Output-Based FM Contracts", "where": "bca.gov.sg \u2192 search 'output-based facilities management' or via the FM section. Free PDF; if retitled, take whatever current BCA publication covers outcome-based FM procurement.", "url": "https://www.bca.gov.sg", "time": "45 min \u2014 read properly, not skimmed", "prime": "You have written KPIs in transformation work. Predict two ways a contractor could game a poorly worded cleaning KPI \u2014 then check whether BCA's samples guard against your two.", "task": ["Read the full guide", "Test your gaming predictions against the sample indicators", "Rewrite one KPI from your own contract into output form using BCA's pattern: standard, measurement, frequency, consequence"], "output": "One rewritten KPI, shown before and after.", "check": ["Your rewrite names the measurement method and the consequence, not just the standard", "You can name one condition under which output-based contracting fails"]}, {"badge": "pub", "t": "Real FM tenders on GeBIZ \u2014 read the specifications", "where": "gebiz.gov.sg \u2192 search integrated facilities management or building maintenance, both open and awarded. Other agencies' specifications are public.", "url": "https://www.gebiz.gov.sg", "time": "40 min \u2014 one spec in full, two skimmed for contrast", "prime": "You have tooling for this. Treat GeBIZ as a corpus to mine, not a webpage to read.", "task": ["Pull three or more IFM or term-maintenance specifications", "Extract per tender: scope structure, KPI table shape, term and options, award value where shown", "Mark two things peer agencies require that your contract lacks"], "output": "A comparison grid: your contract versus two peers, with the two gaps named.", "check": ["The gaps are specific clauses or schedules, not impressions", "You now know what comparable estates cost to run, roughly"]}, {"badge": "int", "t": "Your last IBC monthly report and payment claim \u2014 internal", "where": "FMM records \u2014 one recent month's performance report plus the corresponding payment claim.", "time": "30 min", "prime": "Estimate what percentage of monthly spend is additional works before you look. Consistently above ~20% usually signals a scope problem.", "task": ["Reconcile the claim: base sum, additional works, deductions", "Compare the additional-works percentage against your estimate and against other months", "Note whether any deduction has ever actually been applied"], "output": "One month reconciled on a single page, with your estimate written beside the actual.", "check": ["You can explain every line of the claim", "'Has a deduction ever been applied?' has a definite answer"]}, {"badge": "field", "t": "Field task \u2014 shadow the IBC for an hour", "where": "Ask to join a routine site walk or the contractor's daily briefing.", "time": "60 min", "prime": "Go in with one Lean question: where does their day leak time on things the contract makes harder than it needs to be?", "task": ["Observe the walk or briefing without steering it", "Note three things supervisors worry about that never appear in the monthly report", "Ask what in the scope they find unclear or unreasonable \u2014 then just listen"], "output": "Three field observations plus one scope ambiguity, dated and filed.", "check": ["At least one observation is actionable at re-tender", "You spoke less than they did"]}],
  review:[
    {q:"What does an integrated building contract bundle, and what is the core rationale?", a:"Hard and soft FM services across a whole site under one contractor for a fixed term. Rationale: single point of accountability, fewer interfaces, no inter-trade finger-pointing, less contract administration."},
    {q:"Name six parts of an FM contract you should be able to navigate by name.", a:"Conditions of contract, service specification/scope, schedule of rates, manpower schedule, deliverables schedule (PPM programme, asset register, reports), KPI/performance schedule \u2014 plus term/extensions and exclusions."},
    {q:"What is the routine/additional split and why does it matter daily?", a:"Base scope is covered by the contract sum; additional works are ordered and priced separately from the schedule of rates or by quotation. Nearly every day-to-day dispute is an argument about which side of that line a job falls on."},
    {q:"List five risk-allocation questions to check in an FM contract.", a:"Who supplies consumables; who carries spares and to what value; the threshold where replacement becomes capital; who holds licences and makes statutory submissions; who owns the asset register and maintenance data. (Also: insurance limits and latent defect liability.)"},
    {q:"Manpower-based vs outcome-based specification \u2014 and the precondition for outcome-based to work.", a:"Manpower specifies attendance and frequency; outcome specifies measurable standards and availability. Outcome-based only works if the standards are genuinely measurable and the client can verify them."},
    {q:"How far ahead should an FM re-tender start, and why?", a:"Typically 9\u201312 months before expiry \u2014 scope review, specification, approvals, tender, evaluation, award, mobilisation and inter-contractor handover all take time. Start late and you extend by default, losing negotiating position."},
    {q:"What is the main trade-off of the integrated model?", a:"Greater dependency on a single supplier and a harder, riskier re-tender, in exchange for the accountability and interface benefits."}
  ]},

{ id:"s6", num:6, track:"fm", title:"FMM III: Managing the IBC",
  why:"A good contract badly administered performs worse than an average contract well administered. This session is the client-side craft: the rhythm, the evidence, the performance regime, and the structural problems (information asymmetry and incumbency) that quietly erode client control over a long contract.",
  verify:"Your agency will have its own contract administration procedures, approval limits for variations, and reporting formats. Use those as the authority; this session gives you the framework to make sense of them.",
  concepts:[
    {t:"The operating rhythm", d:"Daily: site walk, fault reports, urgent issues. Weekly: work order review, outstanding jobs, coordination with operations and training schedules. Monthly: formal service performance meeting against KPIs, payment certification, review of additional works. Quarterly: trend review, budget position, recurring problems. Annually: contract review, asset condition, planning for the next year and eventually re-tender. The rhythm is the control mechanism \u2014 nothing else substitutes for showing up regularly with the data."},
    {t:"KPIs that survive contact with reality", d:"Common FM indicators: response time by priority, rectification time, PPM completion rate, statutory compliance rate, system availability or uptime, complaint resolution and reopen rate, and safety incidents. A good KPI is measurable from evidence the client can independently see, resistant to gaming, and tied to something that actually matters. Watch for the classic failure: measuring response (someone attended) rather than resolution (it works again) \u2014 contractors optimise for whatever you count."},
    {t:"The performance regime", d:"KPIs only bite if something follows from missing them. Typical mechanisms: service credits or payment deductions, escalating consequences for repeated failure, formal improvement notices, and ultimately termination rights. The regime must be proportionate and evidenced \u2014 deductions applied without a documented basis get disputed and usually lost. Document contemporaneously; a note written the same day beats a reconstruction three months later."},
    {t:"Variations, additional works and claims", d:"Additional work is ordered through a defined instruction process, priced from the schedule of rates where a rate exists or by quotation where it does not, approved within delegated financial limits, and recorded. Watch for scope creep in both directions: work being absorbed as \u2018goodwill\u2019 that should have been paid (which stores up resentment and later refusal), and work being charged as additional that the base scope already covered."},
    {t:"Information asymmetry and the incumbency problem", d:"The contractor knows the true condition of the plant and the true effort involved far better than you do \u2014 that is the principal-agent problem. Over a long incumbency it compounds into dependency: the contractor becomes the only party who understands the estate, and the client loses the ability to specify, verify or credibly re-tender. The countermeasures are structural: the agency owns the asset register and maintenance data (contractually, and in a portable format); independent condition surveys periodically; internal officers who can technically challenge; and genuine market testing at re-tender rather than default extension."},
    {t:"Managing contractors on a secure site", d:"On a Home Team campus the ordinary FM relationship carries extra layers: security screening and clearance of contractor personnel, escorting and access control in restricted areas, permit-to-work systems for hot work and confined spaces, coordination so maintenance does not disrupt training or operations, and the agency's workplace safety and health duties toward contractor staff working on its premises. These constraints belong in the contract and the specification, not just in practice."}
  ],
  objectives:["Run a monthly performance meeting from your own data: KPI results, deduction basis, additional-works review", "Diagnose response-vs-resolution gaming in a KPI set and draft the replacement for the worst offender", "Name the four structural countermeasures to the incumbency problem and assess which your agency actually has"],
  transfer:"At the next contractor meeting, bring one piece of independently verified evidence \u2014 your own walk, your own data \u2014 and use it. Notice how the dynamic changes when the client has facts of its own.",
  resources:[{"badge": "int", "t": "Your KPI schedule plus the last four monthly reports \u2014 internal", "where": "FMM records: the KPI schedule from the contract and a full quarter of performance reporting.", "time": "40 min", "prime": "Prediction: which KPI has never been missed? A never-missed KPI is usually measuring the wrong thing or set too loose.", "task": ["Tabulate four months of KPI results", "Classify each KPI twice: response-measuring vs resolution-measuring, and contractor-reported vs independently verifiable", "Find the never-missed KPIs and write what failure they would not catch"], "output": "A KPI audit table with two rewrite candidates and their drafted replacements.", "check": ["Each replacement is verifiable from evidence you control", "Your never-missed prediction is confirmed or refuted with data"]}, {"badge": "int", "t": "Your agency's contract administration procedure \u2014 internal", "where": "Procurement, finance or the contracts officer: standing guidance on variations, approval limits, payment certification and disputes.", "time": "30 min", "prime": "Walk in with a scenario: a $30k urgent repair on a Saturday night. Read the procedure specifically to resolve that scenario.", "task": ["Resolve the scenario step by step: who instructs, who approves, what paper, what timeline", "Note the escalation route when a contractor disputes a deduction", "Note record-keeping obligations: what is kept, for how long"], "output": "The $30k Saturday scenario resolved on half a page.", "check": ["No step says 'probably' \u2014 every step has a named authority", "You know the dispute escalation route without re-reading"]}, {"badge": "pub", "t": "BCA Output-Based FM guide \u2014 second pass, KPI sections only", "where": "Same PDF as Session 5, re-opened with a narrower question.", "url": "https://www.bca.gov.sg", "time": "25 min", "prime": "This pass has one question: how does BCA word verification so that a deduction survives a dispute?", "task": ["Re-read only the indicator and payment-linkage sections", "Extract the wording pattern: standard + measurement + frequency + consequence", "Draft three KPIs for your own contract in exactly that pattern"], "output": "Three re-tender-ready KPIs.", "check": ["Each names its evidence source", "A colleague reading them could compute the deduction unaided"]}, {"badge": "pub", "t": "MOM / WSH Council \u2014 occupier duties toward contractors", "where": "mom.gov.sg \u2192 Workplace Safety and Health \u2192 duties of occupiers and principals; wshc.sg for free approved codes of practice and contractor-management guides.", "url": "https://www.mom.gov.sg", "time": "30 min", "prime": "Test your instinct: an IBC technician is injured doing your PPM \u2014 whose problem is it? Answer in writing before reading.", "task": ["Read the occupier and principal duties and the contractor-management guidance", "Correct your instinct answer, citing the legal basis", "List what your campus actually does \u2014 orientation, risk assessment, permit-to-work \u2014 and mark the gaps"], "output": "Your corrected answer plus a three-line gap list.", "check": ["Your answer explains why outsourcing does not transfer the duty", "Each gap has a named owner to raise it with"]}, {"badge": "field", "t": "Field task \u2014 audit ten work orders end to end", "where": "Ten closed work orders from the last two months.", "time": "35 min", "prime": "Design the sample before pulling it: mix priorities and trades, select randomly. You know why from Lean Six Sigma.", "task": ["Measure report-to-attendance and attendance-to-resolution separately for each", "Test every closure against: would an auditor accept this evidence?", "Flag misbilled routine/additional calls in either direction", "Trace any repeat fault to its maintenance strategy, not its technician"], "output": "A 10-row audit sheet with one systemic finding.", "check": ["The systemic finding names a cause, not a symptom", "Your finding would change either the contract, the process or the system \u2014 you have said which"]}],
  review:[
    {q:"Describe the client-side operating rhythm from daily to annual.", a:"Daily site walk and faults; weekly work order and coordination review; monthly performance meeting, payment certification and additional works review; quarterly trend and budget review; annual contract review, condition assessment and re-tender planning."},
    {q:"What makes a good FM KPI, and what is the classic failure mode?", a:"Measurable from evidence the client can independently see, resistant to gaming, tied to something that matters. Classic failure: measuring response (attendance) rather than resolution \u2014 contractors optimise for whatever you count."},
    {q:"Name four mechanisms in a performance regime.", a:"Service credits or payment deductions, escalating consequences for repeated failure, formal improvement notices, and termination rights."},
    {q:"Why do undocumented deductions usually fail?", a:"They get disputed and the client cannot evidence the basis \u2014 contemporaneous documentation beats reconstruction months later."},
    {q:"Scope creep runs in two directions. Describe both.", a:"Work absorbed as goodwill that should have been paid (breeding later refusal), and work charged as additional that the base scope already covered."},
    {q:"What is the incumbency problem and what are the four structural countermeasures?", a:"Long incumbency makes the contractor the only party who understands the estate, eroding the client's ability to specify, verify or re-tender. Counter with: contractual ownership of the asset register and data in portable format, periodic independent condition surveys, internal technical capability, and genuine market testing at re-tender."},
    {q:"Does outsourcing to an IBC transfer your workplace safety duties?", a:"No. As occupier the agency retains duties toward everyone working on its premises, including contractor staff \u2014 risk assessment, permit-to-work and safe systems remain shared, not transferred."}
  ]},

{ id:"s7", num:7, track:"proc", title:"Procuring FM in Government",
  why:"You cannot manage an IBC contract well without understanding how it was bought \u2014 and you will eventually run a re-tender. Government procurement is rules-based and the rules constrain things that feel obvious, like simply keeping a contractor you like.",
  verify:"Thresholds and procedures are updated periodically and the operational authority is your agency's finance circulars and the Government Instruction Manuals on the intranet \u2014 not any public webpage. Confirm current figures internally before relying on them.",
  concepts:[
    {t:"The three principles", d:"Transparency, open and fair competition, and value for money. These are why you cannot simply renew a contractor you are happy with, why specifications must not be written around one supplier, and why evaluation criteria are fixed before bids are opened rather than after. Value for money is explicitly not lowest price \u2014 but departing from lowest price requires a documented, defensible basis."},
    {t:"Sourcing methods and value bands", d:"Broadly: small value purchases handled by direct quotation below a low threshold; Invitation to Quote (ITQ) in the middle band; Invitation to Tender (ITT) above it, either open or selective (two-stage with pre-qualification). Widely cited figures put small value purchase below about S$6,000 and ITQ between roughly S$6,000 and S$90,000, with tenders above that \u2014 but treat those as indicative and verify the current thresholds against your own finance circulars."},
    {t:"Evaluation methods", d:"Lowest compliant bid is common for straightforward commodities. Price-Quality Method (PQM) applies fixed weightings (for example price 60%, quality 40%) declared in advance and awards on the combined score. Two-envelope evaluation opens the technical proposal first and only opens price envelopes for bidders who clear the technical bar. For an integrated FM contract, PQM or two-envelope is usually right \u2014 lowest price on a bundled multi-year service contract tends to buy you a problem."},
    {t:"Writing a specification that buys quality", d:"The specification is where you either get a good contract or guarantee a bad one. Practical levers: specify outcomes and standards rather than only headcount; state criticality and response times explicitly; require named key personnel with minimum qualifications and experience; require the asset register and data in a portable format owned by the agency; build in the security clearance and site constraints; and set evaluation criteria that reward demonstrated capability, not just paperwork."},
    {t:"Contract mechanics", d:"Term or period contracts with option-to-extend periods. Schedules of rates for foreseeable additional works. Bid bonds at tender and performance bonds during the contract. Required insurances. Price adjustment or review provisions for multi-year contracts. Mobilisation and demobilisation obligations \u2014 including the outgoing contractor's duty to hand over records, spares and access, which is precisely what you will need if the incumbent loses."},
    {t:"The re-tender as a project", d:"Sequence it backwards from expiry: scope and lessons-learned review, market sounding, specification drafting, internal approvals, tender publication and clarification period, evaluation, award approval, then mobilisation overlapping with the outgoing contractor. Nine to twelve months is normal. Treat the lessons-learned review as the most important step \u2014 it is the only moment where everything you learned from administering the contract can change anything."}
  ],
  objectives:["Choose and defend the sourcing method and evaluation approach for an FM re-tender against lowest-price pressure", "State your agency's current procurement thresholds and approving authorities, verified internally", "Build a re-tender timeline backwards from your contract's expiry date"],
  transfer:"Take your IBC contract's expiry date and sketch the backwards timeline this week \u2014 even if re-tender is years away, you will see whether the clock has quietly started.",
  resources:[{"badge": "pub", "t": "MOF \u2014 Government Procurement: policies and processes", "where": "mof.gov.sg \u2192 Policies \u2192 Government Procurement: the main page, 'Procurement processes', and any evaluation-method material.", "url": "https://www.mof.gov.sg/policies/government-procurement/", "time": "35 min", "prime": "You know the vendor's view from your GeBIZ projects. Read the same rules from the buyer's chair and note what changes.", "task": ["Write the buyer-side implication of each principle, one line each", "Map the sourcing methods to their value bands", "Note where WTO GPA obligations force genuine openness above threshold"], "output": "Three principles with three buyer-side implications, plus the method-to-band map.", "check": ["You can explain why writing a spec around the incumbent is a violation, not a shortcut", "Your band map is labelled 'indicative \u2014 verify internally'"]}, {"badge": "int", "t": "Instruction Manuals and finance circulars \u2014 internal", "where": "Intranet, or your procurement/finance officer: current thresholds, approving authorities, extension rules, and conflict-of-interest and gift rules.", "time": "40 min", "prime": "The public figures were indicative; the internal ones govern. Expect at least one number to surprise you.", "task": ["Write down the actual current bands and approving authorities", "Note the conditions under which extension or direct engagement is permissible", "Read the COI and gift declaration rules \u2014 you deal with contractors daily; these apply to you personally"], "output": "A verified thresholds card that supersedes every public figure.", "check": ["Every public number you noted earlier now has the internal figure beside it", "You know your own declaration obligations"]}, {"badge": "pub", "t": "GeBIZ \u2014 awarded contract records for FM services", "where": "gebiz.gov.sg \u2192 awarded contracts search \u2192 integrated facilities management, building maintenance, term maintenance. Award records show vendor, value, duration and method.", "url": "https://www.gebiz.gov.sg", "time": "35 min \u2014 and given your scraping habit, this is a dataset", "prime": "Hypothesis: incumbents usually win FM re-tenders. Pull the data and test it.", "task": ["Log ten or more awards: agency, vendor, value, duration, method, incumbent-or-not where inferable", "Test the incumbency hypothesis against your log", "Profile the recurring vendors \u2014 this is your realistic bidder pool"], "output": "A mini market map: 10+ awards logged, top vendors profiled.", "check": ["You can name three to five realistic bidders for your estate and their going rates", "Your hypothesis has a data-backed verdict"]}, {"badge": "field", "t": "Field task \u2014 read one full FM ITT specification end to end", "where": "A live or recently closed integrated FM tender from another agency on GeBIZ; download the full document package.", "time": "45 min", "prime": "Read it as the evaluator, not the vendor. For each section ask: could I score competing bids against this fairly?", "task": ["Map its structure: scope, exclusions, KPIs, payment mechanism, evaluation criteria and weightings", "Apply the evaluator test to each section and mark where scoring would be contestable", "List everything it requires that your own contract does not"], "output": "A structure map plus your re-tender improvement backlog.", "check": ["Backlog items are clause-level, not impressions", "You could explain the evaluation weightings to a tender board"]}],
  review:[
    {q:"State the three government procurement principles.", a:"Transparency, open and fair competition, and value for money \u2014 where value for money is explicitly not lowest price, but any departure must be documented and defensible."},
    {q:"Name the sourcing methods from lowest to highest value band.", a:"Small value purchase by direct quotation \u2192 Invitation to Quote (ITQ) \u2192 Invitation to Tender (ITT), open or selective with pre-qualification. Verify current thresholds against internal circulars."},
    {q:"What is PQM and what is two-envelope evaluation?", a:"Price-Quality Method applies fixed pre-declared weightings and awards on combined score. Two-envelope opens technical proposals first and only opens prices for bidders clearing the technical bar."},
    {q:"Why is lowest-price evaluation risky for a bundled multi-year FM contract?", a:"The contractor recovers margin through disputes over scope, minimal staffing and deferred work \u2014 you pay later in failures, additional works claims and asset deterioration."},
    {q:"Name five specification levers that buy quality.", a:"Specify outcomes and standards not just headcount; state criticality and response times; require named key personnel with minimum qualifications; require agency ownership of the asset register in portable format; build in security clearance and site constraints."},
    {q:"Why does the outgoing contractor's handover obligation matter so much?", a:"If the incumbent loses, you need records, asset data, spares and access transferred cleanly \u2014 without a contractual duty, a departing contractor has little incentive to cooperate and the new one starts blind."},
    {q:"How long before expiry should a re-tender start, and what is its most important step?", a:"9\u201312 months. The lessons-learned review \u2014 the only point at which everything learned from administering the contract can change the next one."}
  ]},
